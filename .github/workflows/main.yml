name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Pinned to an older, highly stable Ubuntu version

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip autoconf automake autopoint libtool pkg-config

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build APK with Buildozer
      # The "yes |" automatically accepts Android SDK licenses so the build doesn't freeze
      run: yes | buildozer android debug
      
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Faisals-Bird-APK
        path: bin/*.apk
