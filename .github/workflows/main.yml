name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      # This installs all the heavy C-compilers and missing SSL/FFI libraries
      run: |
        sudo apt update
        sudo apt install -y build-essential git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Python Dependencies
      # Forcing Cython to 0.29.33 is the magic fix for the toolchain crash
      run: |
        pip install --upgrade pip
        pip install buildozer virtualenv
        pip install Cython==0.29.33

    - name: Build APK with Buildozer
      run: buildozer android debug
      
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Faisals-Bird-APK
        path: bin/*.apk
